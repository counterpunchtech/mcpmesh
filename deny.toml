# Kept in LOCKSTEP with the private monorepo's root deny.toml (mirror model: see CONTRIBUTING.md).
# advisories uses the RustSec DB — this replaces a separate cargo-audit step (spec P11).
# unmaintained: direct deps of workspace crates fail; transitive ones are silent (see
# [advisories]) — recorded decision, not an accident. unsound/vulnerability/yanked all
# fail; ignore per-ID if ever accepted.

[licenses]
# Unlicense (public-domain dedication, CC0's sibling) and CDLA-Permissive-2.0
# (Mozilla CA bundle data in webpki-roots) arrived with the iroh tree (Task 6);
# both are permissive OSS.
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause",
         "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib", "CC0-1.0", "BSL-1.0", "MPL-2.0",
         "Unlicense", "CDLA-Permissive-2.0"]

[advisories]
# RUSTSEC-2026-0204 (crossbeam-epoch, vuln: fmt::Pointer on Atomic/Shared derefs an
# invalid/null pointer; affects >=0.9.0 <0.9.20; transitive via iroh=1.0.1 →
# hickory-resolver → moka) was fixed in-place by `cargo update -p crossbeam-epoch
# --precise 0.9.20` — a patch bump inside moka's semver range, no iroh re-pin needed.
# No ignore required; recorded here so the lockfile bump isn't a mystery later.
yanked = "deny"
# cargo-deny 0.16 removed warn-severity for advisories (deny by default); 0.18.2 added
# this scope. "workspace" = fail only when the unmaintained crate is a direct dependency
# of a workspace crate; transitive ones (e.g. RUSTSEC-2024-0436 `paste` via
# iroh→netwatch→netdev→netlink-packet-core, Linux targets) are fully silent — not even
# a warning.
unmaintained = "workspace"

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
